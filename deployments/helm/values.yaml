# Default values for Pivot
# This is a YAML-formatted file.

# Gateway configuration
gateway:
  replicaCount: 3
  image:
    repository: pivot/gateway
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 4317
    grpcPort: 4317
    httpPort: 4318

  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ClickHouse configuration
clickhouse:
  enabled: true
  replicaCount: 3
  persistence:
    enabled: true
    size: 100Gi

  resources:
    limits:
      cpu: 4000m
      memory: 8Gi
    requests:
      cpu: 2000m
      memory: 4Gi

# PostgreSQL configuration
postgresql:
  enabled: true
  auth:
    database: pivot
    username: pivot

  primary:
    persistence:
      enabled: true
      size: 20Gi

# Redis configuration
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true

  master:
    persistence:
      enabled: true
      size: 8Gi

# Console UI configuration
console:
  enabled: true
  replicaCount: 2
  image:
    repository: pivot/console
    tag: "0.1.0"

  service:
    type: ClusterIP
    port: 3000

# Ingress configuration
ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: pivot.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: pivot-tls
      hosts:
        - pivot.example.com

# Monitoring
monitoring:
  enabled: true
  prometheus:
    enabled: true
  grafana:
    enabled: true
